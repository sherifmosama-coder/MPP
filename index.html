<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <base target="_top">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              appBg: '#F8FAFC',
              cardBg: '#FFFFFF',
              primary: '#0F172A',
              accent: '#3B82F6',
              borderLight: '#E2E8F0'
            },
            keyframes: {
              'icon-pulse': {
                '0%, 100%': { transform: 'scale(1.5)' },
                '50%': { transform: 'scale(1.8)' }
              }
            },
            animation: {
              'icon-pulse': 'icon-pulse 2s ease-in-out infinite'
            }
          }
        }
      }
    </script>
  </head>
  
  <body class="bg-slate-50 text-primary font-sans antialiased min-h-screen p-4 flex justify-center items-center overflow-x-hidden">
    
    <div id="mainCard" class="relative w-full max-w-md backdrop-blur-xl bg-white rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] border border-white/60 p-6 sm:p-8 overflow-hidden transition-all duration-1000 ease-in-out">
      
      <div class="absolute -top-8 -left-6 text-[150px] leading-none text-slate-100 opacity-60 pointer-events-none z-0 transform -rotate-12 transition-all duration-700 drop-shadow-sm">
        <i id="watermarkIcon" class="bi bi-clock-fill"></i>
      </div>

      <div class="relative z-10">
        
        <div class="flex justify-center mb-6">
          <div class="px-4 py-1.5 rounded-full bg-white/40 border border-white/60 shadow-sm backdrop-blur-md flex items-center gap-2 text-slate-600 font-bold text-sm tracking-wide">
            <i class="bi bi-clock-history"></i>
            <span id="liveClock">--:-- --</span>
          </div>
        </div>
        
      <div class="flex justify-center mb-6">
        <div class="relative w-48 h-48 rounded-full shadow-lg flex justify-center items-center" style="background: conic-gradient(from -36deg, #fcd34d 0 72deg, #fb923c 72deg 144deg, #fb7185 144deg 216deg, #818cf8 216deg 288deg, #94a3b8 288deg 360deg);">
          
          <div class="absolute w-44 h-44 bg-white/90 backdrop-blur-xl rounded-full shadow-inner flex justify-center items-center border border-white">
            
            <div class="absolute inset-0 pointer-events-none transform rotate-[0deg]">
              <div onclick="syncFromDial('Morning Login')" class="absolute top-2 left-1/2 -translate-x-1/2 transform -rotate-[0deg] pointer-events-auto cursor-pointer hover:scale-110 transition-transform duration-200 z-30">
                <div id="icon-morning" class="text-amber-500 text-2xl drop-shadow-sm transition-all duration-500 flex justify-center items-center w-8 h-8 opacity-40">
                  <i class="bi bi-sunrise-fill relative z-10"></i>
                </div>
              </div>
            </div>
            
            <div class="absolute inset-0 pointer-events-none transform rotate-[72deg]">
              <div onclick="syncFromDial('Midday Cue')" class="absolute top-2 left-1/2 -translate-x-1/2 transform -rotate-[72deg] pointer-events-auto cursor-pointer hover:scale-110 transition-transform duration-200 z-30">
                <div id="icon-midday" class="text-orange-500 text-2xl drop-shadow-sm transition-all duration-500 flex justify-center items-center w-8 h-8 opacity-40">
                  <i class="bi bi-sun-fill relative z-10"></i>
                </div>
              </div>
            </div>
            
            <div class="absolute inset-0 pointer-events-none transform rotate-[144deg]">
              <div onclick="syncFromDial('Afternoon Shift')" class="absolute top-2 left-1/2 -translate-x-1/2 transform -rotate-[144deg] pointer-events-auto cursor-pointer hover:scale-110 transition-transform duration-200 z-30">
                <div id="icon-afternoon" class="text-rose-400 text-2xl drop-shadow-sm transition-all duration-500 flex justify-center items-center w-8 h-8 opacity-40">
                  <i class="bi bi-cup-hot-fill relative z-10"></i>
                </div>
              </div>
            </div>
            
            <div class="absolute inset-0 pointer-events-none transform rotate-[216deg]">
              <div onclick="syncFromDial('Evening Wind-Down')" class="absolute top-2 left-1/2 -translate-x-1/2 transform -rotate-[216deg] pointer-events-auto cursor-pointer hover:scale-110 transition-transform duration-200 z-30">
                <div id="icon-evening" class="text-indigo-400 text-2xl drop-shadow-sm transition-all duration-500 flex justify-center items-center w-8 h-8 opacity-40">
                  <i class="bi bi-sunset-fill relative z-10"></i>
                </div>
              </div>
            </div>
            
            <div class="absolute inset-0 pointer-events-none transform rotate-[288deg]">
              <div onclick="syncFromDial('Night Closure')" class="absolute top-2 left-1/2 -translate-x-1/2 transform -rotate-[288deg] pointer-events-auto cursor-pointer hover:scale-110 transition-transform duration-200 z-30">
                <div id="icon-night" class="text-slate-500 text-2xl drop-shadow-sm transition-all duration-500 flex justify-center items-center w-8 h-8 opacity-40">
                  <i class="bi bi-moon-stars-fill relative z-10"></i>
                </div>
              </div>
            </div> <div class="relative w-12 h-12 bg-white rounded-full shadow-md border border-gray-100 flex justify-center items-center z-10">
              <div class="w-3 h-3 bg-slate-800 rounded-full z-20"></div>
            </div>

            <div id="dialSelector" class="absolute w-full h-full rounded-full transition-transform duration-700 ease-[cubic-bezier(0.34,1.56,0.64,1)] z-20 pointer-events-none">
              <div class="absolute top-10 left-1/2 -translate-x-1/2 text-slate-800 text-xl drop-shadow-md transition-all">
                <i class="bi bi-caret-up-fill"></i>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="text-center mb-8">
        <h2 class="text-2xl font-bold tracking-tight text-slate-800">Pattern Tracker</h2>
        <p class="text-sm text-slate-500 mt-1">Select a segment to align the dial.</p>
      </div>

      <form id="checkInForm" onsubmit="submitForm(event)" class="space-y-6">
        
        <div>
          <label class="block text-sm font-semibold mb-2 text-gray-700">Time Segment</label>
          <select name="timeSegment" onchange="rotateDial(this.value)" class="w-full border border-white/60 bg-white/50 backdrop-blur-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-accent focus:border-accent outline-none shadow-sm transition-all text-slate-700 font-medium" required>
            <option value="" disabled selected>Select current segment...</option>
            <option value="Morning Login">Morning Login</option>
            <option value="Midday Cue">Midday Cue</option>
            <option value="Afternoon Shift">Afternoon Shift</option>
            <option value="Evening Wind-Down">Evening Wind-Down</option>
            <option value="Night Closure">Night Closure</option>
          </select>
        </div>

        <div id="checkInFields" class="opacity-0 max-h-0 overflow-hidden transition-all duration-[1500ms] ease-[cubic-bezier(0.25,1,0.5,1)] transform translate-y-8">
          
          <div class="space-y-5 pt-4">
            
            <div id="moodBg" class="bg-white/50 backdrop-blur-md border border-white/80 rounded-2xl p-4 shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)] transition-colors duration-500">
              <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Mood</span>
                <span id="moodVal" class="text-xl font-extrabold text-[#34d399] transition-colors duration-300">5</span>
              </div>
              <div class="flex items-center gap-3">
                <i class="bi bi-emoji-frown-fill text-slate-400 text-lg"></i>
                <input type="range" name="mood" min="1" max="10" value="5" class="w-full h-2 rounded-lg appearance-none bg-white/80 shadow-inner outline-none transition-all duration-300 cursor-pointer" style="accent-color: #34d399;" oninput="updateSlider(this, 'mood')">
                <i class="bi bi-emoji-smile-fill text-emerald-500 text-lg"></i>
              </div>
            </div>

            <div id="energyBg" class="bg-white/50 backdrop-blur-md border border-white/80 rounded-2xl p-4 shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)] transition-colors duration-500">
              <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Energy</span>
                <span id="energyVal" class="text-xl font-extrabold text-[#2dd4bf] transition-colors duration-300">5</span>
              </div>
              <div class="flex items-center gap-3">
                <i class="bi bi-battery text-slate-400 text-lg"></i>
                <input type="range" name="energy" min="1" max="10" value="5" class="w-full h-2 rounded-lg appearance-none bg-white/80 shadow-inner outline-none transition-all duration-300 cursor-pointer" style="accent-color: #2dd4bf;" oninput="updateSlider(this, 'energy')">
                <i class="bi bi-lightning-charge-fill text-emerald-500 text-lg"></i>
              </div>
            </div>

            <div id="stressBg" class="bg-white/50 backdrop-blur-md border border-white/80 rounded-2xl p-4 shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)] transition-colors duration-500">
              <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Stress / Load</span>
                <span id="stressVal" class="text-xl font-extrabold text-[#fbbf24] transition-colors duration-300">5</span>
              </div>
              <div class="flex items-center gap-3">
                <i class="bi bi-cup-hot text-emerald-400 text-lg"></i>
                <input type="range" name="stress" min="1" max="10" value="5" class="w-full h-2 rounded-lg appearance-none bg-white/80 shadow-inner outline-none transition-all duration-300 cursor-pointer" style="accent-color: #fbbf24;" oninput="updateSlider(this, 'stress')">
                <i class="bi bi-fire text-rose-500 text-lg"></i>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="flex items-center gap-1.5 block text-xs font-bold mb-1 text-slate-600 uppercase tracking-wider">
                  <i class="bi bi-activity text-slate-400 text-sm"></i> Activity
                </label>
                <input type="text" name="activity" list="activityOptions" placeholder="Type or select..." class="w-full border border-white/60 bg-white/50 backdrop-blur-sm rounded-xl px-3 py-3 focus:ring-2 focus:ring-slate-400 outline-none shadow-sm text-sm font-semibold text-slate-700 placeholder-slate-400 transition-all" required>
                <datalist id="activityOptions"></datalist>
              </div>
              <div>
                <label class="flex items-center gap-1.5 block text-xs font-bold mb-1 text-slate-600 uppercase tracking-wider">
                  <i class="bi bi-tags-fill text-slate-400 text-sm"></i> Tags (Opt)
                </label>
                <input type="text" name="tags" list="tagOptions" placeholder="Type or select..." class="w-full border border-white/60 bg-white/50 backdrop-blur-sm rounded-xl px-3 py-3 focus:ring-2 focus:ring-slate-400 outline-none shadow-sm text-sm font-semibold text-slate-700 placeholder-slate-400 transition-all">
                <datalist id="tagOptions"></datalist>
              </div>
            </div>

            <div>
              <label class="flex items-center gap-1.5 block text-xs font-bold mb-1 text-slate-600 uppercase tracking-wider">
                <i class="bi bi-card-text text-slate-400 text-sm"></i> Brief Note (Opt)
              </label>
              <input type="text" name="notes" placeholder="One sentence max..." class="w-full border border-white/60 bg-white/50 backdrop-blur-sm rounded-xl px-4 py-3 focus:ring-2 focus:ring-slate-400 outline-none shadow-sm text-sm font-semibold text-slate-700 placeholder-slate-400 transition-all">
            </div>

            <button id="submitBtn" type="submit" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-semibold py-4 px-4 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 mt-2">
              <i class="bi bi-floppy"></i> Submit
            </button>
            
          </div>
        </div>
        
        <p id="statusMsg" class="text-center text-sm font-semibold mt-2 hidden"></p>

      </form>
      </div> </div>
  

    <script>
      // Live Clock Logic
      function startClock() {
        const clockElement = document.getElementById('liveClock');
        setInterval(() => {
          const now = new Date();
          let hours = now.getHours();
          let minutes = now.getMinutes();
          const ampm = hours >= 12 ? 'PM' : 'AM';
          
          hours = hours % 12;
          hours = hours ? hours : 12; // the hour '0' should be '12'
          minutes = minutes < 10 ? '0' + minutes : minutes;
          
          clockElement.innerText = `${hours}:${minutes} ${ampm}`;
        }, 1000);
      }

      // Initialize Smart Droplists & Clock on Load
      document.addEventListener("DOMContentLoaded", () => {
        startClock(); // Start the live ticking
        google.script.run.withSuccessHandler(populateDroplists).getUniqueOptions();
      });

      function populateDroplists(options) {
        const actList = document.getElementById('activityOptions');
        const tagList = document.getElementById('tagOptions');
        
        options.activities.forEach(item => {
          let opt = document.createElement('option');
          opt.value = item;
          actList.appendChild(opt);
        });
        
        options.tags.forEach(item => {
          let opt = document.createElement('option');
          opt.value = item;
          tagList.appendChild(opt);
        });
      }

      // 24-Hour Dial & Theme Logic
      const segmentData = {
        "Morning Login": { angle: 0, theme: "from-amber-200", icon: "bi-sunrise-fill", id: "icon-morning" },
        "Midday Cue": { angle: 72, theme: "from-orange-300", icon: "bi-sun-fill", id: "icon-midday" },
        "Afternoon Shift": { angle: 144, theme: "from-rose-300", icon: "bi-cup-hot-fill", id: "icon-afternoon" },
        "Evening Wind-Down": { angle: 216, theme: "from-indigo-300", icon: "bi-sunset-fill", id: "icon-evening" },
        "Night Closure": { angle: 288, theme: "from-slate-300", icon: "bi-moon-stars-fill", id: "icon-night" }
      };

      // Bidirectional Sync: Dial updates Dropdown
      function syncFromDial(segment) {
        // 1. Update the hidden/visible Dropdown selection
        const selectMenu = document.querySelector('select[name="timeSegment"]');
        selectMenu.value = segment;
        
        // 2. Trigger the main visual rotation function
        rotateDial(segment);
      }

      function rotateDial(segment) {
        const selector = document.getElementById('dialSelector');
        const mainCard = document.getElementById('mainCard');
        const watermark = document.getElementById('watermarkIcon');
        
        if (segmentData[segment]) {
          const data = segmentData[segment];

          // 1. Rotate the arrow pointer
          selector.style.transform = `rotate(${data.angle}deg)`;
          
          // 2. Animate the card background gradient
          mainCard.className = `relative w-full max-w-md backdrop-blur-xl bg-gradient-to-br ${data.theme} via-white to-white to-60% rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] border border-white/60 p-6 sm:p-8 overflow-hidden transition-all duration-1000 ease-in-out`;
          
          // 3. Update the Watermark icon
          watermark.className = `bi ${data.icon} text-white opacity-80 transition-all duration-700`;

          // 4. Handle Icon Pulsing and Opacity
          Object.values(segmentData).forEach(seg => {
            const el = document.getElementById(seg.id);
            
            if (seg.id === data.id) {
              // Active State: Apply custom pulse animation, full opacity
              el.classList.add('animate-icon-pulse', 'opacity-100');
              el.classList.remove('opacity-40');
            } else {
              // Inactive State: Remove pulse, dim opacity
              el.classList.remove('animate-icon-pulse', 'opacity-100');
              el.classList.add('opacity-40');
            }
          });

          // 5. Reveal the hidden input fields smoothly
          const formFields = document.getElementById('checkInFields');
          formFields.classList.remove('opacity-0', 'max-h-0', 'translate-y-8');
          formFields.classList.add('opacity-100', 'max-h-[1000px]', 'translate-y-0');
        }
      }

      // Slider Dynamic Color Logic
      const colorMaps = {
        // Sad (Grey) -> Neutral -> Happy (Green)
        mood:   ['#94a3b8', '#64748b', '#9ca3af', '#2dd4bf', '#14b8a6', '#10b981', '#34d399', '#4ade80', '#22c55e', '#16a34a'], 
        
        // Drained (Grey) -> Moderate (Yellow at 5) -> High Energy (Green at 10)
        energy: ['#94a3b8', '#cbd5e1', '#fef08a', '#fde047', '#eab308', '#a3e635', '#84cc16', '#4ade80', '#22c55e', '#16a34a'], 
        
        // Low Stress (Green) -> High Stress (Red)
        stress: ['#6ee7b7', '#34d399', '#10b981', '#fcd34d', '#fbbf24', '#f59e0b', '#fb923c', '#f87171', '#ef4444', '#b91c1c'] 
      };

      function updateSlider(input, type) {
        const val = parseInt(input.value);
        const valDisplay = document.getElementById(type + 'Val');
        const cardBg = document.getElementById(type + 'Bg');
        
        // Update number
        valDisplay.innerText = val;
        
        // Fetch intensity color based on the 1-10 index array
        const color = colorMaps[type][val - 1];
        
        // Apply colors to slider accent, text, and add a subtle glowing tint to the glass card border and background
        input.style.accentColor = color;
        valDisplay.style.color = color;
        cardBg.style.backgroundColor = color + '12'; // Hex + 12 opacity (~7% tint)
        cardBg.style.borderColor = color + '40';     // Hex + 40 opacity (~25% tint)
      }

      function submitForm(event) {
        event.preventDefault(); // Prevent page reload
        
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const form = document.getElementById('checkInForm');
        
        // Change UI to Loading state
        btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Processing...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
        btn.disabled = true;
        
        // Gather data safely
        const formData = {
          timeSegment: form.timeSegment.value,
          mood: form.mood.value,
          energy: form.energy.value,
          stress: form.stress.value,
          activity: form.activity.value,
          tags: form.tags.value,
          notes: form.notes.value
        };

        // Send to backend Code.gs
        google.script.run
          .withSuccessHandler(function(response) {
            if(response === "Success") {
              btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Saved Successfully';
              btn.classList.replace('bg-primary', 'bg-emerald-500');
              
              // Reset form and UI after 2 seconds
              setTimeout(() => {
                form.reset();
                document.getElementById('moodVal').innerText = "5";
                document.getElementById('energyVal').innerText = "5";
                document.getElementById('stressVal').innerText = "5";
                btn.innerHTML = '<i class="bi bi-floppy"></i> Submit';
                btn.classList.replace('bg-emerald-500', 'bg-primary');
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
              }, 2000);
            } else {
              showError(btn, "Error. Try again.");
            }
          })
          .withFailureHandler(function(error) {
            showError(btn, "Connection failed.");
          })
          .processForm(formData);
      }

      function showError(btn, msg) {
        btn.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> ${msg}`;
        btn.classList.replace('bg-primary', 'bg-rose-500');
        setTimeout(() => {
          btn.innerHTML = '<i class="bi bi-floppy"></i> Submit';
          btn.classList.replace('bg-rose-500', 'bg-primary');
          btn.classList.remove('opacity-70', 'cursor-not-allowed');
          btn.disabled = false;
        }, 3000);
      }
    </script>
  </body>
</html>
