    <script>
      // Live Clock & Auto-Dial Logic
      function startClock() {
        const clockElement = document.getElementById('liveClock');
        
          window.updateTime = () => {
          const now = new Date();
          const options = { weekday: 'long' };
          const weekday = new Intl.DateTimeFormat('en-US', options).format(now);
          
          let hours = now.getHours();
          let minutes = now.getMinutes();
          const ampm = hours >= 12 ? 'PM' : 'AM';
          
          hours = hours % 12;
          hours = hours ? hours : 12; 
          minutes = minutes < 10 ? '0' + minutes : minutes;
          
          clockElement.innerText = `${weekday} — ${hours}:${minutes} ${ampm}`;
          
          // Dynamically calculate current time segment
                  let segment = "Night Closure";
                  const currentHour = now.getHours();
                  
                  if (window.segmentsConfig) {
                    segment = window.segmentsConfig[window.segmentsConfig.length - 1].name;
                    for (let i = 0; i < window.segmentsConfig.length; i++) {
                      if (currentHour >= window.segmentsConfig[i].startHour) {
                        segment = window.segmentsConfig[i].name;
                      } else {
                        break;
                      }
                    }
                  } else {
                    // Fallback while Google Sheets config is loading
                    if (currentHour >= 5 && currentHour < 11) segment = "Morning Login";
                    else if (currentHour >= 11 && currentHour < 14) segment = "Midday Cue";
                    else if (currentHour >= 14 && currentHour < 17) segment = "Afternoon Shift";
                    else if (currentHour >= 17 && currentHour < 21) segment = "Evening Wind-Down";
                  }
                  
                  // IMPORTANT FIX: Only auto-rotate the visual dial if the user is NOT logging a past time
                  const isPastLogging = document.getElementById('timeToggle') ? document.getElementById('timeToggle').checked : false;
                  if (!isPastLogging) {
                    rotateDial(segment);
                  }

          // Intro Reveal Sequence (Executes only once per page load)
          if (!window.introPlayed) {
            window.introPlayed = true;
            
            // Map the light color to the time of day
            const sweepColors = {
              "Morning Login": "via-amber-200",
              "Midday Cue": "via-orange-300",
              "Afternoon Shift": "via-rose-300",
              "Evening Wind-Down": "via-indigo-300",
              "Night Closure": "via-slate-300"
            };
            
            // Apply the color and trigger the sweep
            const sweepEl = document.getElementById('introSweep');
            sweepEl.className = `absolute top-0 left-0 w-[200%] h-full opacity-90 mix-blend-overlay transform translate-x-[150%] skew-x-[-15deg] bg-gradient-to-l from-transparent ${sweepColors[segment]} to-transparent animate-glare-sweep`;

      // Post-Submission Overlay Logic
      function showSubmissionOverlay(alignmentInsight, riskInsight) {
        
        const svg = document.getElementById('hexGridSvg');
        const hexTop = document.getElementById('hexTop');
        const hexLeft = document.getElementById('hexLeft');
        const hexRight = document.getElementById('hexRight');

          alignmentColor = "text-emerald-500";

          hexTop.setAttribute('class', "opacity-100 transition-all duration-500");
          hexLeft.setAttribute('class', "opacity-100 transition-all duration-500");
          hexRight.setAttribute('class', "opacity-100 transition-all duration-500");
          
          // Direct browser physics (bypasses Tailwind compiler)
          hexTop.style.transform = "translate(0px, 0px)";
          hexLeft.style.transform = "translate(0px, 0px)";
          hexRight.style.transform = "translate(0px, 0px)";
        }

          alignmentColor = "text-rose-500";
          // Shattered, fading apart
          hexTop.setAttribute('class', "opacity-90 transition-all duration-500");
          hexLeft.setAttribute('class', "opacity-30 transition-all duration-500");

          hexRight.style.transform = "translate(1.5px, 1.5px)";

          hexLeft.setAttribute('class', "opacity-60 transition-all duration-500");
          hexRight.setAttribute('class', "opacity-60 transition-all duration-500");
          
          // Direct browser physics (holds them together)
          hexTop.style.transform = "translate(0px, 0px)";
          hexLeft.style.transform = "translate(0px, 0px)";
          hexRight.style.transform = "translate(0px, 0px)";
        }

        // Apply the master color to the whole SVG cluster safely
        svg.setAttribute('class', `drop-shadow-sm transition-colors duration-500 ${alignmentColor}`);

        // 2. Assign Risk Colors
        let riskColor = "text-amber-500"; // Default to Rising

      // Toggle Time Picker Logic
      function toggleTimePicker() {
        const toggle = document.getElementById('timeToggle');
        const popover = document.getElementById('pastTimeContainer');
        const dateInput = document.getElementById('pastDate');
        const timeInput = document.getElementById('pastTime');
        
        if (toggle.checked) {
          popover.classList.remove('hidden'); // Show tooltip
          
          const now = new Date();
          const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
          dateInput.max = localDate; 
          
          // Only prefill if the fields are empty
          if (!dateInput.value) {
            dateInput.value = localDate;
            now.setHours(now.getHours() - 1);
            timeInput.value = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(11, 16);
          }
        } else {
          // Turn off Custom Time completely
          popover.classList.add('hidden');
          document.getElementById('pastTimeChip').classList.add('hidden');
          document.getElementById('toggleLabel').innerText = "Event Time";
          window.confirmedPastDateTime = "";
          dateInput.value = "";
          timeInput.value = "";
          if (window.updateTime) window.updateTime(); // Reset dial to live time
        }
      }

      function cancelTimePicker() {
        const popover = document.getElementById('pastTimeContainer');
        popover.classList.add('hidden');
        
        // If they cancelled without ever confirming a time, turn the toggle back off
        if (!window.confirmedPastDateTime) {
          document.getElementById('timeToggle').checked = false;
          toggleTimePicker();
        }
      }

      function confirmTimePicker() {
        const dateVal = document.getElementById('pastDate').value;
        const timeVal = document.getElementById('pastTime').value;

        if (!dateVal || !timeVal) {
          showToast("Please select both a date and a time.", "error");
          return;
        }

        const combinedStr = `${dateVal}T${timeVal}`;
        const selectedTimeMs = new Date(combinedStr).getTime();
        const nowMs = new Date().getTime();

        // 1. Hard Validation against exact current second
        if (selectedTimeMs > nowMs) {
          showToast("You cannot log a pattern in the future. Please pick an earlier time.", "error");
          return; 
        }

        // 2. Validation Passed: Save it, close tooltip, update label
        window.confirmedPastDateTime = combinedStr;
        document.getElementById('pastTimeContainer').classList.add('hidden');

        const displayDate = new Date(combinedStr);
        let hours = displayDate.getHours();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        const mins = displayDate.getMinutes().toString().padStart(2, '0');
        
        // Reset the toggle label just to "Logging Past" now that we have the chip
        document.getElementById('toggleLabel').innerText = "Logging Past";
        
        // Format and show the Past Time Chip below the title
        const chipOptions = { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true };
        document.getElementById('pastTimeChipText').innerText = displayDate.toLocaleString('en-US', chipOptions);
        document.getElementById('pastTimeChip').classList.remove('hidden');

        // 3. Update the Dial
        updateDialFromPastTime(timeVal);
      }

      function updateDialFromPastTime(timeString) {
        const currentHour = parseInt(timeString.split(':')[0]);
        let segment = "Night Closure"; 
        
        if (window.segmentsConfig) {
          segment = window.segmentsConfig[window.segmentsConfig.length - 1].name;
          for (let i = 0; i < window.segmentsConfig.length; i++) {
            if (currentHour >= window.segmentsConfig[i].startHour) {
              segment = window.segmentsConfig[i].name;
            } else {
              break;
            }
          }
        } else {
          if (currentHour >= 5 && currentHour < 11) segment = "Morning Login";
          else if (currentHour >= 11 && currentHour < 14) segment = "Midday Cue";
          else if (currentHour >= 14 && currentHour < 17) segment = "Afternoon Shift";
          else if (currentHour >= 17 && currentHour < 21) segment = "Evening Wind-Down";
        }
        
        rotateDial(segment);
      }

      // 24-Hour Dial & Theme Logic
      const segmentData = {
        "Morning Login": { angle: 0, theme: "from-amber-200", icon: "bi-sunrise-fill", id: "icon-morning" },
        "Midday Cue": { angle: 72, theme: "from-orange-300", icon: "bi-sun-fill", id: "icon-midday" },
        "Afternoon Shift": { angle: 144, theme: "from-rose-300", icon: "bi-cup-hot-fill", id: "icon-afternoon" },
        "Evening Wind-Down": { angle: 216, theme: "from-indigo-300", icon: "bi-sunset-fill", id: "icon-evening" },
        "Night Closure": { angle: 288, theme: "from-slate-300", icon: "bi-moon-stars-fill", id: "icon-night" }
      };

      function rotateDial(segment) {
        const selector = document.getElementById('dialSelector');
        const mainCard = document.getElementById('mainCard');
        const watermark = document.getElementById('watermarkIcon');
        
        if (segmentData[segment]) {
          const data = segmentData[segment];

          // 1. Rotate the arrow pointer
          selector.style.transform = `rotate(${data.angle}deg)`;
          
          // 2. Ensure main card stays purely white glass, and color the themeBg instead
          const mainCard = document.getElementById('mainCard');
          mainCard.className = "relative w-full max-w-md backdrop-blur-xl bg-white rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.07)] border border-white/60 p-6 sm:p-8 overflow-hidden transition-all duration-1000 ease-in-out";
          
          const themeBg = document.getElementById('themeBg');
          if (themeBg) {
            // Remove previous theme classes to prevent overlaps
            Object.values(segmentData).forEach(seg => themeBg.classList.remove(seg.theme));
            // Apply the new theme class
            themeBg.classList.add(data.theme);
          }
          
          // 3. Update the Watermark icon
          watermark.className = `bi ${data.icon} text-white transition-all duration-700`;

          // 4. Update the Dynamic Title to match the segment
          const titleEl = document.getElementById('dynamicTitle');
          if (titleEl) {
            titleEl.innerText = segment;
          }

          // 4. Handle Icon Pulsing and Opacity
          Object.values(segmentData).forEach(seg => {
            const el = document.getElementById(seg.id);
            
            if (seg.id === data.id) {
              // Active State: Apply custom pulse animation, full opacity
              el.classList.add('animate-icon-pulse', 'opacity-100');
              el.classList.remove('opacity-40');
            } else {
              // Inactive State: Remove pulse, dim opacity
              el.classList.remove('animate-icon-pulse', 'opacity-100');
              el.classList.add('opacity-40');
            }
          });

          // 5. Reveal the hidden input fields smoothly
          const formFields = document.getElementById('checkInFields');
          formFields.classList.remove('opacity-0', 'max-h-0', 'translate-y-8');
          formFields.classList.add('opacity-100', 'max-h-[1000px]', 'translate-y-0');
        }
      }

      // Slider Dynamic Color Logic
      const colorMaps = {
        // Sad (Grey) -> Neutral -> Happy (Green)
        mood:   ['#94a3b8', '#64748b', '#9ca3af', '#2dd4bf', '#14b8a6', '#10b981', '#34d399', '#4ade80', '#22c55e', '#16a34a'], 
        
        // Drained (Grey) -> Moderate (Yellow at 5) -> High Energy (Green at 10)
        energy: ['#94a3b8', '#cbd5e1', '#fef08a', '#fde047', '#eab308', '#a3e635', '#84cc16', '#4ade80', '#22c55e', '#16a34a'], 
        
        // Low Stress (Green) -> High Stress (Red)
        stress: ['#6ee7b7', '#34d399', '#10b981', '#fcd34d', '#fbbf24', '#f59e0b', '#fb923c', '#f87171', '#ef4444', '#b91c1c'] 
      };

      function updateSlider(input, type) {
        const val = parseInt(input.value);
        const valDisplay = document.getElementById(type + 'Val');
        const cardBg = document.getElementById(type + 'Bg');
        
        // Update number
        valDisplay.innerText = val;
        
        // Fetch intensity color based on the 1-10 index array
        const color = colorMaps[type][val - 1];
        
        // Apply colors to slider accent, text, and add a subtle glowing tint to the glass card border and background
        input.style.accentColor = color;
        valDisplay.style.color = color;
        cardBg.style.backgroundColor = color + '12'; // Hex + 12 opacity (~7% tint)
        cardBg.style.borderColor = color + '40';     // Hex + 40 opacity (~25% tint)
      }

      function submitForm(event) {
        event.preventDefault(); // Prevent page reload
        
        const btn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const form = document.getElementById('checkInForm');
        
        // Change UI to Loading state
        btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> Processing...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
        btn.disabled = true;
        
        const isPast = document.getElementById('timeToggle').checked;

        // Failsafe: Ensure they actually confirmed a time if the toggle is on
        if (isPast && !window.confirmedPastDateTime) {
          showToast("Please use the Confirm button to lock in your past time selection.", "error");
          submitBtn.innerHTML = originalBtnText;
          submitBtn.disabled = false;
          return;
        }

        // Gather data safely
        const formData = {
          isPastEntry: isPast,
          pastDateTime: isPast ? window.confirmedPastDateTime : "", 
          mood: form.mood.value,
          energy: form.energy.value,
          stress: form.stress.value,
          activity: form.activity.value,
          tags: form.tags.value,
          notes: form.notes.value
        };

        // Send to backend Code.gs
        google.script.run
          .withSuccessHandler(function(response) {
            if(response.status === "Success") {
              // Restore the submit button instantly
              btn.innerHTML = '<i class="bi bi-floppy"></i> Submit';
              btn.classList.remove('opacity-70', 'cursor-not-allowed');
              btn.disabled = false;
              
              // Trigger the beautiful slide-up overlay using LIVE data from the Google Sheet
              showSubmissionOverlay(response.alignment, response.risk);
              
              // Automatically refresh the dashboard timeline to show the new entry
              fetchTimeline();
              
            } else {
              showError(btn, "Error. Try again.");
            }
          })
          .withFailureHandler(function(error) {
            showError(btn, "Connection failed.");
          })
          .processForm(formData);
      }

      function showError(btn, msg) {
        btn.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> ${msg}`;
        btn.classList.replace('bg-primary', 'bg-rose-500');
        setTimeout(() => {
          btn.innerHTML = '<i class="bi bi-floppy"></i> Submit';
          btn.classList.replace('bg-rose-500', 'bg-primary');
          btn.classList.remove('opacity-70', 'cursor-not-allowed');
          btn.disabled = false;
        }, 3000);
      }
    </script>
  <div id="submissionOverlay" class="fixed bottom-0 left-0 right-0 z-[99999] transform translate-y-full transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] p-4 sm:p-6 pointer-events-none">
      <div class="mx-auto max-w-md bg-white/95 backdrop-blur-3xl border border-slate-200/80 p-5 rounded-3xl shadow-[0_-15px_40px_-10px_rgba(0,0,0,0.15)] pointer-events-auto flex flex-col gap-4">
        
        <div class="flex items-center gap-3 text-emerald-600 font-bold text-[15px] tracking-tight">
          <i class="bi bi-check-circle-fill text-xl drop-shadow-sm"></i>
          <span>Entry added to your daily path.</span>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-1">
          <div class="bg-slate-100/50 rounded-2xl p-3 border border-slate-200/60 shadow-inner">
            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Alignment</div>
            <div id="overlayAlignment" class="text-sm font-extrabold text-slate-700">Good</div>
          </div>
          <div class="bg-slate-100/50 rounded-2xl p-3 border border-slate-200/60 shadow-inner">
            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Risk Index</div>
            <div id="overlayRisk" class="text-sm font-extrabold text-slate-700">Stable</div>
          </div>
        </div>

        <div class="flex items-center justify-between mt-1 pl-1">
          <div class="flex items-center gap-3">
            <svg id="hexGridSvg" width="24" height="24" viewBox="0 0 30 30" class="text-indigo-500 drop-shadow-sm transition-colors duration-500">
              <polygon id="hexTop" points="15,2 21,5.5 21,12.5 15,16 9,12.5 9,5.5" fill="currentColor" class="transition-all duration-500 transform origin-center" />
              <polygon id="hexLeft" points="9,12.5 15,16 15,23 9,26.5 3,23 3,16" fill="currentColor" class="transition-all duration-500 transform origin-center" />
              <polygon id="hexRight" points="21,12.5 27,16 27,23 21,26.5 15,23 15,16" fill="currentColor" class="transition-all duration-500 transform origin-center" />
            </svg>
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-tight">Truth<br>Alignment</div>
          </div>
          
          <button type="button" onclick="dismissOverlay()" class="px-6 py-2.5 bg-slate-800 text-white text-xs font-bold uppercase tracking-wider rounded-xl hover:bg-slate-700 active:scale-95 transition-all shadow-md">Dismiss</button>
        </div>

      </div>
    </div>
  </body>
</html>
